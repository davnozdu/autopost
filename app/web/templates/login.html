<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>autopost — вход</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 380px; margin: 80px auto;
           padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.2rem; }
    label { display:block; margin: 12px 0 4px; font-size: .9rem; }
    input { width:100%; padding:8px; border:1px solid #e2e2e2; border-radius:8px; }
    button { margin-top:16px; padding:9px 16px; border-radius:8px; border:none;
             background:#2563eb; color:#fff; cursor:pointer; }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;
           padding:10px 12px; border-radius:8px; margin:12px 0; font-size:.9rem; }
  </style>
</head>
<body>
  <h1>Вход</h1>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Пароль</label>
    <input type="password" name="password" required autofocus>
    <button type="submit">Войти</button>
  </form>
</body>
</html>

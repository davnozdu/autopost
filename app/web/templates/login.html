<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>autopost — вход</title>
  <style>
    :root { --accent:#2563eb; --accent-hover:#1d4ed8; --ink:#0f172a; --muted:#64748b; --b:#e6e8ee; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; color: var(--ink); background: #f5f6f8;
    }
    .box {
      width: 100%; max-width: 380px; background: #fff; border: 1px solid var(--b);
      border-radius: 16px; padding: 28px; box-shadow: 0 8px 30px rgba(16,24,40,.08);
    }
    .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 1.15rem; margin-bottom: 4px; }
    .logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg,#3b82f6,#2563eb);
            display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(37,99,235,.35); }
    .logo svg { width: 17px; height: 17px; color: #fff; }
    h1 { font-size: 1.05rem; margin: 0; }
    .sub { color: var(--muted); font-size: .9rem; margin: 2px 0 18px; }
    label { display:block; margin: 12px 0 5px; font-size: .88rem; font-weight: 500; color:#334155; }
    input { width:100%; padding:10px 12px; min-height:42px; border:1px solid #d4d8e2; border-radius:9px; font-size:.95rem; }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.18); }
    button { margin-top:18px; width:100%; padding:11px 16px; border-radius:9px; border:none; font-weight:600;
             background:var(--accent); color:#fff; cursor:pointer; font-size:.95rem; transition:background .15s; }
    button:hover { background:var(--accent-hover); }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;
           padding:10px 12px; border-radius:9px; margin:14px 0 0; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg></span>
      autopost
    </div>
    <h1>Вход в админку</h1>
    <p class="sub">Введите пароль администратора.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label>Пароль</label>
      <input type="password" name="password" required autofocus>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>autopost — админка</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto;
           padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .card { border: 1px solid #e2e2e2; border-radius: 10px; padding: 16px; margin: 16px 0; }
    .row { display: flex; justify-content: space-between; padding: 4px 0; }
    .muted { color: #777; }
    button { padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc;
             background: #f6f6f6; cursor: pointer; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>autopost</h1>
  <p class="muted">Каркас (Фаза 0). Источники, очередь статей, Telegram и публикация — в следующих фазах.</p>

  <div class="card">
    <h2 style="font-size:1.1rem">LLM</h2>
    <div class="row"><span>Провайдер</span><strong>{{ provider }}</strong></div>
    <div class="row"><span>Модель</span><strong>{{ model }}</strong></div>
    <div class="row"><span>Ключ задан</span><strong>{{ "да" if key_configured else "нет" }}</strong></div>
  </div>

  <div class="card">
    <button onclick="testLLM()">Пробный вызов модели</button>
    <pre id="out" class="muted">Нажмите кнопку, чтобы проверить связь с моделью…</pre>
  </div>

  <script>
    async function testLLM() {
      const out = document.getElementById('out');
      out.textContent = 'Запрос…';
      try {
        const r = await fetch('/api/llm/test', { method: 'POST' });
        const j = await r.json();
        out.textContent = JSON.stringify(j, null, 2);
      } catch (e) {
        out.textContent = 'Ошибка: ' + e;
      }
    }
  </script>
</body>
</html>
